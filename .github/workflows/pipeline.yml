name: movie-backend-workflow
run-name: Test and deploy on cloud

on:
  push:
    branches: ["multi_ds"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: main-test
      - name: Set up JDK 17 for tests
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          architecture: x64
      - name: Run tests
        working-directory: ${{github.workspace}}/main-test
        run: mvn test

  build:
    needs: [test]
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [ '22.x' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: main

      - name: fetch frontend artifact name
        id: foo
        run: echo info=`cat ${{github.workspace}}/main/.github/workflows/data.json` >> $GITHUB_OUTPUT

      - name: Fetch frontend artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ fromJSON(steps.foo.outputs.info).runId}}
          github-token: ${{secrets.UI_REPO_ACTIONS_READ_TOKEN}}
          repository: ${{ github.actor }}/movie-system-ui
          path: ${{github.workspace}}

      - name: Copy ui artifacts to static resources backend project dir
        working-directory: ${{github.workspace}}/main/application/src/main/resources
        run: mkdir static && cp -r ${{github.workspace}}/${{ fromJSON(steps.foo.outputs.info).frontend}}_build/* ./static/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          architecture: x64

#      - name: Build with Maven
#        working-directory: ${{github.workspace}}/main
#        run: mvn clean package -Dmaven.test.skip=true
#
#      - name: Upload artifact
#        uses: actions/upload-artifact@v4
#        with:
#          name: movie-app
#          path: '${{ github.workspace }}/main/application/target/*.jar'
      - name: Log in to Container Registry
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.DOCKER_IMAGE_PUSH}}

      - name: Build and upload container image
        uses: docker/build-push-action@v6.18.0
        with:
          context: ${{github.workspace}}/main
          push: true
          tags: ghcr.io/${{github.actor}}/app:${{ github.sha }}

  deploy:
    if: github.ref == 'refs/heads/multi_ds'
    permissions:
      id-token: write
      contents: read
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image to Azure
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: movie-apps
          containerAppName: movie-app
          imageToDeploy: ghcr.io/${{ github.actor }}/app:${{ github.sha }}
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.READ_PACKAGES }}
