name: Trigger auto deployment for movie-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/movie-app-AutoDeployTrigger-3a649ed0-189c-405c-89a5-58d168c1f661.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MOVIEAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MOVIEAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MOVIEAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.MOVIEAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MOVIEAPP_REGISTRY_PASSWORD }}
          containerAppName: movie-app
          resourceGroup: movie-apps
          imageToBuild: ghcr.io/movie-app:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


